name: uz++ Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

# ─── Helper: what files go into the compiler zip ─────────────────────────────
# Each platform job builds uzpp[.exe] then bundles it with stdlib/ into an archive.
# The archive layout (which componentManager.js expects):
#   uzpp-windows-x64.zip:
#     uzpp.exe
#     stdlib/uzpp_runtime.hpp
#     stdlib/...
#   uzpp-linux-x64.tar.gz:
#     uzpp
#     stdlib/...
#   (same for macos)

jobs:
  # ──────────────────────────────────────────────────────────
  build-windows:
    name: Windows — uzpp + stdlib zip
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      - name: Build
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -B build
          cmake --build build --config Release

      - name: Run unit tests
        run: ./build/uzpp_frontend_tests.exe

      - name: Package uzpp-windows-x64.zip
        shell: pwsh
        run: |
          $pkg = "pkg-windows"
          New-Item -ItemType Directory -Path $pkg | Out-Null
          Copy-Item build/uzpp.exe $pkg/
          Copy-Item -Recurse stdlib $pkg/stdlib
          Compress-Archive -Path $pkg/* -DestinationPath uzpp-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: uzpp-windows-x64
          path: uzpp-windows-x64.zip

  # ──────────────────────────────────────────────────────────
  build-linux:
    name: Linux — uzpp + stdlib tar.gz
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (GCC-15 via toolchain PPA)
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update -qq
          # libstdc++-15-dev brings the <generator> header (C++23 coroutines).
          # libx11-dev / libgl1-mesa-dev are needed for the X11/GL targets
          # CMakeLists.txt links against on Linux (Grafika::Oyna stdlib).
          sudo apt-get install -y gcc-15 g++-15 libstdc++-15-dev cmake ninja-build libx11-dev libgl1-mesa-dev
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-15 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-15 100

      - name: Build
        env:
          CC: gcc-15
          CXX: g++-15
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -B build
          cmake --build build --config Release

      - name: Run unit tests
        run: ./build/uzpp_frontend_tests

      - name: Package uzpp-linux-x64.tar.gz
        run: |
          mkdir pkg-linux
          cp build/uzpp pkg-linux/
          cp -r stdlib pkg-linux/stdlib
          tar -czf uzpp-linux-x64.tar.gz -C pkg-linux .

      - uses: actions/upload-artifact@v4
        with:
          name: uzpp-linux-x64
          path: uzpp-linux-x64.tar.gz

  # ──────────────────────────────────────────────────────────
  build-macos-arm64:
    name: macOS arm64 — uzpp + stdlib tar.gz
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: brew install cmake ninja

      - name: Build
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -B build
          cmake --build build --config Release

      - name: Package uzpp-macos-arm64.tar.gz
        run: |
          mkdir pkg-macos-arm64
          cp build/uzpp pkg-macos-arm64/
          cp -r stdlib pkg-macos-arm64/stdlib
          tar -czf uzpp-macos-arm64.tar.gz -C pkg-macos-arm64 .

      - uses: actions/upload-artifact@v4
        with:
          name: uzpp-macos-arm64
          path: uzpp-macos-arm64.tar.gz

  # macOS x64 (Intel) job removed in v2.1.8 — the `macos-13` runner is
  # deprecated by GitHub Actions (deprecation announced Sept 2025) and was
  # leaving the release job stuck in `queued` indefinitely. Apple Silicon
  # is the only macOS target Apple itself still ships hardware for, and
  # `build-macos-arm64` above covers it. If Intel macOS support is needed
  # later, switch this job to `macos-14-large` (Intel xlarge) or cross
  # build from arm64.

  # ──────────────────────────────────────────────────────────
  # Download a portable MinGW-w64 and re-upload as our release artifact.
  # Using WinLibs GCC 14.2.0 UCRT64 posix/seh (no MSYS2 required, pure portable).
  # URL: https://github.com/brechtsanders/winlibs_mingw/releases/
  # Pin a specific release for reproducibility.
  # ──────────────────────────────────────────────────────────
  package-mingw:
    name: Package MinGW-w64 for Windows
    runs-on: ubuntu-latest
    env:
      # WinLibs GCC 15.2.0 UCRT64 posix/seh — matches Linux CI's gcc-15.
      # Old tag (14.2.0posix-18.1.8-12.0.0-ucrt-r2) was 404 — WinLibs changed
      # naming conventions; today's scheme is <gcc>posix-<mingw-w64>-ucrt-r<N>.
      MINGW_VERSION: "15.2.0posix-14.0.0-ucrt-r7"
      MINGW_FILENAME: "winlibs-x86_64-posix-seh-gcc-15.2.0-mingw-w64ucrt-14.0.0-r7.zip"
    steps:
      - name: Download WinLibs MinGW
        run: |
          # -f makes curl exit non-zero on HTTP errors (else it would write
          # a 9-byte HTML error page and pretend everything was fine — exactly
          # what landed in v2.1.7 / first v2.1.8 release attempts).
          curl -fL --retry 3 -o mingw-source.zip \
            "https://github.com/brechtsanders/winlibs_mingw/releases/download/${MINGW_VERSION}/${MINGW_FILENAME}"
          # Sanity check: the archive is ~255 MB; if we got <100 MB something
          # is wrong (silent partial download, redirect HTML, etc).
          size=$(stat -c %s mingw-source.zip)
          echo "Downloaded $size bytes"
          if [ "$size" -lt 100000000 ]; then
            echo "ERROR: mingw zip is suspiciously small ($size bytes)"
            exit 1
          fi

      # Rename to our canonical artifact name so componentManager.js can download it
      - name: Rename to canonical name
        run: mv mingw-source.zip mingw-w64-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: mingw-w64-windows
          path: mingw-w64-windows-x64.zip

  # ──────────────────────────────────────────────────────────
  # Create GitHub Release with all artifacts
  # ──────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [build-windows, build-linux, build-macos-arm64, package-mingw]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "uz++ ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## uz++ ${{ github.ref_name }}

            ### Tezkor o'rnatish (VS Code kengaytmasi orqali)

            1. VS Code Extensions → "uz++" → Install
            2. Welcome ekranida **"Hammasini o'rnatish"** tugmasini bosing
            3. F5 → dastur ishga tushadi

            ---

            ### Qo'lda o'rnatish

            **Windows:**
            ```powershell
            curl -L -o uzpp.zip https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/uzpp-windows-x64.zip
            Expand-Archive uzpp.zip -DestinationPath uzpp-install
            # uzpp.exe + stdlib/ hazir
            ```

            **Linux:**
            ```bash
            curl -L -o uzpp.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/uzpp-linux-x64.tar.gz
            mkdir uzpp-install && tar -xzf uzpp.tar.gz -C uzpp-install
            sudo cp uzpp-install/uzpp /usr/local/bin/
            sudo cp -r uzpp-install/stdlib /usr/local/lib/uzpp/
            ```

            **macOS (Apple Silicon):**
            ```bash
            curl -L -o uzpp.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/uzpp-macos-arm64.tar.gz
            mkdir uzpp-install && tar -xzf uzpp.tar.gz -C uzpp-install
            sudo cp uzpp-install/uzpp /usr/local/bin/
            sudo cp -r uzpp-install/stdlib /usr/local/lib/uzpp/
            ```

            ### Arxiv tarkibi

            | Fayl | Tarkib |
            |------|--------|
            | `uzpp-windows-x64.zip` | `uzpp.exe` + `stdlib/` |
            | `uzpp-linux-x64.tar.gz` | `uzpp` + `stdlib/` |
            | `uzpp-macos-arm64.tar.gz` | `uzpp` + `stdlib/` (Apple Silicon) |
            | `mingw-w64-windows-x64.zip` | Portable C++ kompilyatori (g++) Windows uchun |
          files: |
            dist/uzpp-windows-x64/uzpp-windows-x64.zip
            dist/uzpp-linux-x64/uzpp-linux-x64.tar.gz
            dist/uzpp-macos-arm64/uzpp-macos-arm64.tar.gz
            dist/mingw-w64-windows/mingw-w64-windows-x64.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ──────────────────────────────────────────────────────────
  # Publish VS Code extension (lightweight — no embedded binary)
  # ──────────────────────────────────────────────────────────
  publish-extension:
    name: Publish VS Code Extension
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: vscode-uzpp
        run: npm install

      - name: Publish to Marketplace
        working-directory: vscode-uzpp
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --pat "$VSCE_PAT" --allow-missing-repository
